info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}users/login"
  body:
    type: json
    data: |2-
        {
          "email": "{{email}}",
          "password": "{{password}}",
          "deviceID": "{{device_id}}"
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (!body?.token) {
          throw new Error("Login response does not contain token");
        }
        bru.setVar("token", body.token);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.token
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
