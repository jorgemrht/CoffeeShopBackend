info:
  name: me
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}users/me"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.email
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
