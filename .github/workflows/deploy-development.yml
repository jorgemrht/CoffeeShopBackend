name: Deploy Development

on:
  push:
    # This project deploys the development Heroku app directly from main.
    # That is an intentional exception to the usual branch separation because
    # the repository is kept simple and only uses one active branch for now.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    container: swift:6.3-noble

    steps:
      - uses: actions/checkout@v7

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  bruno-tests:
    uses: ./.github/workflows/bruno.yml
    secrets: inherit

  deploy:
    name: Deploy to Heroku Development
    needs: [build, bruno-tests]
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 30
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate deploy configuration
        run: |
          test -n "$HEROKU_API_KEY"
          test -n "$HEROKU_APP_NAME"

      - name: Log in to Heroku Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Release image on Heroku
        run: |
          heroku container:release web --app "$HEROKU_APP_NAME"

  publish-mcp:
    needs: deploy
    uses: ./.github/workflows/publish-mcp.yml
    secrets: inherit
