name: Deploy Development

on:
  push:
    # This project deploys the development Heroku app directly from main.
    # That is an intentional exception to the usual branch separation because
    # the repository is kept simple and only uses one active branch for now.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate deploy configuration
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          test -n "$HEROKU_API_KEY"
          test -n "$HEROKU_APP_NAME"

      - name: Log in to Heroku Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release image on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --url "https://api.heroku.com/apps/$HEROKU_APP_NAME/formation" \
            --header "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            --header "Authorization: Bearer $HEROKU_API_KEY" \
            --header "Content-Type: application/json" \
            --data "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"${{ steps.build.outputs.digest }}\"}]}"
