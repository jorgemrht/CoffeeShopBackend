name: Deploy Development

on:
  push:
    # This project deploys the development Heroku app directly from main.
    # That is an intentional exception to the usual branch separation because
    # the repository is kept simple and only uses one active branch for now.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    container: swift:6.3-noble

    steps:
      - uses: actions/checkout@v7

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  bruno:
    needs: build
    uses: ./.github/workflows/bruno-container.yml
    with:
      environment_name: development
      image_tag: coffeeshop-development:ci
      image_artifact_name: coffeeshop-development-image
      bruno_report_artifact_name: bruno-report
    secrets: inherit

  deploy:
    needs: bruno
    uses: ./.github/workflows/deploy-heroku.yml
    with:
      environment_name: development
      image_tag: coffeeshop-development:ci
      image_artifact_name: coffeeshop-development-image
      process_type: web
    secrets: inherit

  publish-mcp:
    needs: deploy
    uses: ./.github/workflows/publish-mcp.yml
    secrets: inherit
