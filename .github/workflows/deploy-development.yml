name: Deploy Development

on:
  push:
    # This project deploys the development Heroku app directly from main.
    # That is an intentional exception to the usual branch separation because
    # the repository is kept simple and only uses one active branch for now.
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    container: swift:6.3-noble

    steps:
      - uses: actions/checkout@v7

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  bruno-tests:
    name: Run Bruno API Tests
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Validate Bruno test secrets
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_DEVICE_ID: ${{ secrets.API_DEVICE_ID }}
        run: |
          test -n "$API_BASE_URL"
          test -n "$API_EMAIL"
          test -n "$API_PASSWORD"
          test -n "$API_DEVICE_ID"

      - name: Run Bruno tests
        working-directory: bruno
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_DEVICE_ID: ${{ secrets.API_DEVICE_ID }}
        run: |
          mkdir -p ../reports
          bru run \
            --env dev \
            --env-var base_url="$API_BASE_URL" \
            --env-var email="$API_EMAIL" \
            --env-var password="$API_PASSWORD" \
            --env-var device_id="$API_DEVICE_ID" \
            --reporter-html ../reports/bruno-report.html \
            --reporter-skip-headers Authorization \
            --reporter-skip-body

      - name: Upload Bruno report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: bruno-report
          path: reports/bruno-report.html
          if-no-files-found: error

  deploy:
    name: Deploy to Heroku Development
    needs: [build, bruno-tests]
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 30
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate deploy configuration
        run: |
          test -n "$HEROKU_API_KEY"
          test -n "$HEROKU_APP_NAME"

      - name: Log in to Heroku Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.heroku.com/${{ env.HEROKU_APP_NAME }}/web
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Release image on Heroku
        run: |
          heroku container:release web --app "$HEROKU_APP_NAME"
