name: Deploy Heroku Container

on:
  workflow_call:
    inputs:
      environment_name:
        required: false
        type: string
        default: development
      image_tag:
        required: false
        type: string
        default: coffeeshop-development:ci
      image_artifact_name:
        required: false
        type: string
        default: coffeeshop-development-image
      process_type:
        required: false
        type: string
        default: web

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Heroku Development
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      PROCESS_TYPE: ${{ inputs.process_type }}

    steps:
      - name: Validate deploy configuration
        run: |
          test -n "$HEROKU_API_KEY"
          test -n "$HEROKU_APP_NAME"

      - name: Download validated Docker image
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.image_artifact_name }}
          path: /tmp

      - name: Load validated Docker image
        run: gunzip -c /tmp/coffeeshop-development-ci.tar.gz | docker load

      - name: Log in to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Tag image for Heroku
        run: docker tag "$IMAGE_TAG" "registry.heroku.com/${HEROKU_APP_NAME}/${PROCESS_TYPE}"

      - name: Push image to Heroku
        run: docker push "registry.heroku.com/${HEROKU_APP_NAME}/${PROCESS_TYPE}"

      - name: Resolve local Docker image id
        run: echo "HEROKU_DOCKER_IMAGE_ID=$(docker inspect "$IMAGE_TAG" --format='{{.Id}}')" >> "$GITHUB_ENV"

      - name: Release image on Heroku via Platform API
        run: |
          curl --fail-with-body --silent --show-error \
            -X PATCH "https://api.heroku.com/apps/${HEROKU_APP_NAME}/formation" \
            -H "Authorization: Bearer ${HEROKU_API_KEY}" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Content-Type: application/json" \
            -H "User-Agent: coffeeshop-github-actions" \
            -d "{\"updates\":[{\"type\":\"${PROCESS_TYPE}\",\"docker_image\":\"${HEROKU_DOCKER_IMAGE_ID}\"}]}"
