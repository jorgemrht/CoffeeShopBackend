name: Bruno Container Validation

on:
  workflow_call:
    inputs:
      environment_name:
        required: false
        type: string
        default: development
      docker_context:
        required: false
        type: string
        default: .
      dockerfile_path:
        required: false
        type: string
        default: ./Dockerfile
      image_tag:
        required: false
        type: string
        default: coffeeshop-development:ci
      image_artifact_name:
        required: false
        type: string
        default: coffeeshop-development-image
      bruno_report_artifact_name:
        required: false
        type: string
        default: bruno-report
      container_port:
        required: false
        type: number
        default: 8080

permissions:
  contents: read

jobs:
  validate-container:
    name: Validate Container With Bruno
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      CONTAINER_PORT: ${{ inputs.container_port }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Validate Bruno and Heroku configuration
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_DEVICE_ID: ${{ secrets.API_DEVICE_ID }}
          APP_IDENTITY_TOKEN: ${{ secrets.APP_IDENTITY_TOKEN }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          SUPABASE_ROOT_CERT: ${{ secrets.SUPABASE_ROOT_CERT }}
          VAPOR_ROOT_KEY: ${{ secrets.VAPOR_ROOT_KEY }}
        run: |
          test -n "$API_EMAIL"
          test -n "$API_PASSWORD"
          test -n "$API_DEVICE_ID"
          test -n "$APP_IDENTITY_TOKEN"
          test -n "$DATABASE_HOST"
          test -n "$DATABASE_NAME"
          test -n "$DATABASE_PASSWORD"
          test -n "$DATABASE_PORT"
          test -n "$DATABASE_USERNAME"
          test -n "$SUPABASE_ROOT_CERT"
          test -n "$VAPOR_ROOT_KEY"

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: linux/amd64
          load: true
          tags: ${{ inputs.image_tag }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno against the built container with GitHub secrets
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_DEVICE_ID: ${{ secrets.API_DEVICE_ID }}
          APP_IDENTITY_TOKEN: ${{ secrets.APP_IDENTITY_TOKEN }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          SUPABASE_ROOT_CERT: ${{ secrets.SUPABASE_ROOT_CERT }}
          VAPOR_ROOT_KEY: ${{ secrets.VAPOR_ROOT_KEY }}
        run: |
          docker run -d --rm --name coffeeshop-bruno \
            -p "${CONTAINER_PORT}:${CONTAINER_PORT}" \
            -e "APP_IDENTITY_TOKEN=${APP_IDENTITY_TOKEN}" \
            -e "DATABASE_HOST=${DATABASE_HOST}" \
            -e "DATABASE_NAME=${DATABASE_NAME}" \
            -e "DATABASE_PASSWORD=${DATABASE_PASSWORD}" \
            -e "DATABASE_PORT=${DATABASE_PORT}" \
            -e "DATABASE_USERNAME=${DATABASE_USERNAME}" \
            -e "PAYLOAD_SECURITY_ENABLED=false" \
            -e "PORT=${CONTAINER_PORT}" \
            -e "SUPABASE_ROOT_CERT=${SUPABASE_ROOT_CERT}" \
            -e "VAPOR_ROOT_KEY=${VAPOR_ROOT_KEY}" \
            "$IMAGE_TAG"

          trap 'docker logs coffeeshop-bruno || true; docker stop coffeeshop-bruno || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "http://127.0.0.1:${CONTAINER_PORT}/hello" | grep -F "Hello, world!" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Container readiness check failed"
              exit 1
            fi
            sleep 2
          done

          mkdir -p reports
          cd bruno
          bru run \
            --env dev \
            --env-var base_url="http://127.0.0.1:${CONTAINER_PORT}/" \
            --env-var email="$API_EMAIL" \
            --env-var password="$API_PASSWORD" \
            --env-var device_id="$API_DEVICE_ID" \
            --reporter-html ../reports/bruno-report.html \
            --reporter-skip-headers Authorization \
            --reporter-skip-body

      - name: Upload Bruno report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.bruno_report_artifact_name }}
          path: reports/bruno-report.html
          if-no-files-found: error

      - name: Save validated Docker image
        run: docker save "$IMAGE_TAG" | gzip > /tmp/coffeeshop-development-ci.tar.gz

      - name: Upload validated Docker image
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.image_artifact_name }}
          path: /tmp/coffeeshop-development-ci.tar.gz
          if-no-files-found: error
          retention-days: 1
